<html>

    <body>
        

    <h2>Register</h2>
    <h4>Testing Git</h4>
    <input type="email" id="email" placeholder="Enter Email"><br><br>
    <input type="password" id="password" placeholder="Enter Password"><br><br>
    <button id="registerBtn">Register</button>
    <br><br>
<button id="loginBtn">Login</button>

        <script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import { 
  getAuth, 
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCjXd1Z-UjJVoBrZTMOjFtqT6v3zNEYho0",
    authDomain: "warranty-manager-17.firebaseapp.com",
    projectId: "warranty-manager-17",
    storageBucket: "warranty-manager-17.firebasestorage.app",
    messagingSenderId: "139769292182",
    appId: "1:139769292182:web:b7db39591e9cf4c8d629b7"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  console.log("Firebase Connected Successfully");

  // Get button
  const registerBtn = document.getElementById("registerBtn");

  registerBtn.addEventListener("click", () => {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        alert("User Registered Successfully!");
        console.log(userCredential.user);
      })
      .catch((error) => {
        alert(error.message);
        console.error(error);
      });

  });
  
  const loginBtn = document.getElementById("loginBtn");

loginBtn.addEventListener("click", () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      alert("Login Successful!");
    })
    .catch((error) => {
      alert(error.message);
    });

});

</script>
    </body>
